<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <rect width="16" height="16" fill="#000"/>
  <!-- Antennae -->
  <rect x="4" y="1" width="2" height="2" fill="#00ffff"/>
  <rect x="10" y="1" width="2" height="2" fill="#00ffff"/>
  <!-- Head top -->
  <rect x="3" y="3" width="10" height="2" fill="#ff00ff"/>
  <!-- Head body -->
  <rect x="2" y="5" width="12" height="6" fill="#ff00ff"/>
  <!-- Eyes -->
  <rect x="4" y="6" width="2" height="2" fill="#ffff00"/>
  <rect x="10" y="6" width="2" height="2" fill="#ffff00"/>
  <!-- Mouth -->
  <rect x="5" y="9" width="6" height="1" fill="#00ffff"/>
  <!-- Body bottom -->
  <rect x="3" y="11" width="10" height="2" fill="#ff00ff"/>
  <!-- Legs -->
  <rect x="4" y="13" width="2" height="2" fill="#00ffff"/>
  <rect x="10" y="13" width="2" height="2" fill="#00ffff"/>
</svg>
